<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>EatSnap · 2026-07-09</title>
  <style>
    :root { --bg:#f6f5f1; --card:#fff; --text:#1f1f1f; --muted:#6b6b6b; --line:#e7e5df; --accent:#2f7d52; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font: 15px/1.55 -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      -webkit-text-size-adjust: 100%; }
    .wrap { max-width: 880px; margin: 0 auto; padding: 20px 14px 60px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover, a:active { text-decoration: underline; }
    .meta { color: #999; font-size: 12px; }
    .gen { color: #999; font-size: 12px; margin-top: 16px; }

    .meal { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
      padding: 14px; margin-bottom: 14px; }
    .meal h2 { margin: 0 0 8px; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .meal h2 .pill { font-size: 12px; font-weight: 500; color: var(--muted); }

    .entry { padding: 12px 0; border-top: 1px dashed #ece9e0; }
    .entry:first-of-type { border-top: none; padding-top: 4px; }
    .entry img { display: block; width: 100%; max-width: 360px; height: auto; aspect-ratio: 4/3;
      object-fit: cover; border-radius: 10px; background: #ddd; margin-bottom: 8px; }
    .entry .head { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .status { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 4px;
      background: #eee; color: #555; margin-left: 4px; }
    .status.review { background: #fff3cd; color: #856404; }
    .status.error { background: #f8d7da; color: #721c24; }
    .remark { font-size: 13px; color: var(--muted); margin-bottom: 6px; }

    /* 食物条目：手机单行卡片（名称 + 右对齐数量），桌面表格 */
    .items { background: #fafaf7; border-radius: 10px; overflow: hidden; }
    .it { display: flex; justify-content: space-between; align-items: baseline;
      padding: 8px 12px; border-bottom: 1px solid #ece9e0; font-size: 14px; }
    .it:last-child { border-bottom: none; }
    .it .name { flex: 1; min-width: 0; padding-right: 12px; }
    .it .qty { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .it.subtotal { background: #f0eee8; font-weight: 600; color: var(--text); }
    .it.subtotal .qty { color: var(--accent); }
    .empty { color: #aaa; font-style: italic; padding: 6px 0; }

    /* 桌面：图片栏 + 详情栏两列；缩略图固定宽度 */
    @media (min-width: 720px) {
      .wrap { padding: 24px 16px; }
      .entry { display: grid; grid-template-columns: 200px 1fr; gap: 16px; }
      .entry img { margin-bottom: 0; }
    }
  </style>
</head>
