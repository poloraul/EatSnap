# EatSnap 模型与路径配置
# 敏感 API Key 请放在 .env 中（参考 .env.example），本文件可提交到仓库

default_model: opencode  # 默认调用的多模态模型（必须存在于 models 中）

models:
  opencode:
    provider: anthropic    # 走 Anthropic Messages 协议
    model: minimax-m3      # OpenCode Zen 后端的实际模型
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://opencode.ai/zen/go  # 自定义 base URL（覆盖默认 api.anthropic.com）
  claude:
    provider: anthropic
    model: claude-sonnet-4-6   # 实际模型 ID
    api_key_env: ANTHROPIC_API_KEY
  openai:
    provider: openai
    model: gpt-4o
    api_key_env: OPENAI_API_KEY

# 路径配置
paths:
  # 图片落盘根目录（iCloud Drive, macOS 默认）
  # 同一 Apple ID 登录后会自动同步到云端
  images_root: "~/Library/Mobile Documents/com~apple~CloudDocs/EatSnap/images"
  # 识别结果 JSON 记录目录
  records_dir: "./records"
  # 静态 HTML 报告输出目录
  reports_dir: "./reports"

# 餐别
meals: [早, 午, 晚, 加餐]
