<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>EatSnap · 拍照存 iCloud</title>
  <style>
    :root { --bg:#f6f5f1; --card:#fff; --text:#1f1f1f; --muted:#6b6b6b; --line:#e7e5df; --accent:#2f7d52; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font: 16px/1.5 -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      -webkit-text-size-adjust: 100%; }
    .wrap { max-width: 640px; margin: 0 auto; padding: 20px 16px 80px; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
    .meals { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .meals label { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
      padding: 10px 0; text-align: center; cursor: pointer; font-size: 15px; color: var(--text); margin: 0; }
    .meals input { display: none; }
    .meals input:checked + span { color: var(--accent); font-weight: 600; }
    .meals label:has(input:checked) { background: #e6f3ec; border-color: var(--accent); }
    textarea, input[type=text] {
      width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px;
      background: #fafaf7; font: inherit;
    }
    textarea { min-height: 56px; resize: vertical; }
    .video-wrap { position: relative; width: 100%; aspect-ratio: 4/3; background: #111;
      border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    video, img.preview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .placeholder { color: #aaa; font-size: 14px; }
    .row { display: flex; gap: 10px; margin-top: 10px; }
    button {
      flex: 1; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--line);
      background: #fff; font: inherit; cursor: pointer;
    }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #fff; padding: 10px 16px; border-radius: 999px;
      font-size: 14px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 99; max-width: 86vw; text-align: center; }
    .toast.show { opacity: 1; }
    .meta { font-size: 12px; color: var(--muted); margin-top: 6px; word-break: break-all; }
    .footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 18px; }
    .help { font-size: 12px; color: var(--muted); line-height: 1.6; }
    .help code { background: #f0eee8; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>EatSnap · 拍照存 iCloud</h1>
    <div class="sub">手机端独立采集。图片直接写入 iCloud Drive，由 Mac 端扫描识别。</div>

    <div class="card">
      <label>选择餐别</label>
      <div class="meals" id="meals">
        <label><input type="radio" name="meal" value="早" checked><span>早餐</span></label>
        <label><input type="radio" name="meal" value="午"><span>午餐</span></label>
        <label><input type="radio" name="meal" value="晚"><span>晚餐</span></label>
        <label><input type="radio" name="meal" value="加餐"><span>加餐</span></label>
      </div>
    </div>

    <div class="card">
      <label>备注（可选，识别时给模型看）</label>
      <textarea id="remark" placeholder="例如：一碗牛肉面，少辣"></textarea>
    </div>

    <div class="card">
      <div class="video-wrap" id="videoWrap">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="canvas" hidden></canvas>
        <img id="preview" class="preview" hidden alt="预览">
        <div class="placeholder" id="placeholder">点击下方「开启摄像头」开始</div>
      </div>
      <div class="row">
        <button id="btnCamera" type="button">开启摄像头</button>
        <button id="btnShoot" type="button" disabled>拍照</button>
        <button id="btnRetake" type="button" hidden>重拍</button>
      </div>
      <div class="meta" id="meta"></div>
    </div>

    <div class="row">
      <button id="btnSave" class="primary" type="button" disabled>保存到 iCloud</button>
    </div>

    <div class="card">
      <div class="help">
        <strong>使用说明</strong><br>
        1. 拍完点「保存到 iCloud」，系统会弹出分享面板<br>
        2. 选择「存储到文件」→ 找到 <code>iCloud Drive/EatSnap/</code> 根目录<br>
        3. 文件名已编码日期与餐别（如 <code>2026-07-08_早_e3b0_153326.jpg</code>），Mac 端会自动归位<br>
        4. Mac 端跑一次 <code>python -m server.identify</code> 即可识别
      </div>
    </div>

    <div class="footer">单 HTML，<code>file://</code> 打开或扔到任意静态托管都能用</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const placeholder = document.getElementById('placeholder');
    const btnCamera = document.getElementById('btnCamera');
    const btnShoot = document.getElementById('btnShoot');
    const btnRetake = document.getElementById('btnRetake');
    const btnSave = document.getElementById('btnSave');
    const remarkEl = document.getElementById('remark');
    const metaEl = document.getElementById('meta');
    const toast = document.getElementById('toast');

    let stream = null;
    let capturedBlob = null;
    let capturedFile = null;

    function showToast(msg, isErr) {
      toast.textContent = msg;
      toast.style.background = isErr ? 'rgba(179,38,30,0.9)' : 'rgba(0,0,0,0.85)';
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 2600);
    }

    function getMeal() {
      const el = document.querySelector('input[name="meal"]:checked');
      return el ? el.value : '早';
    }

    // 把备注简单编码成短码（写入文件名，3 字节 hex 最多 16^6=16M 不撞）
    function noteHash(note) {
      const s = (note || '').trim();
      if (!s) return 'x';
      let h = 0;
      for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
      // 6 位十六进制（大写）
      return (h >>> 0).toString(16).padStart(6, '0').slice(-6);
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    // 文件名规则：{YYYY-MM-DD}_{meal}_{note_hash}_{HHMMSS}.jpg
    function buildFilename() {
      const d = new Date();
      const date = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      const time = `${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
      return `${date}_${getMeal()}_${noteHash(remarkEl.value)}_${time}.jpg`;
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1440 } },
          audio: false,
        });
        video.srcObject = stream;
        video.hidden = false;
        preview.hidden = true;
        placeholder.hidden = true;
        btnShoot.disabled = false;
        btnRetake.hidden = true;
        btnSave.disabled = true;
        capturedBlob = null;
        capturedFile = null;
        metaEl.textContent = '';
      } catch (e) {
        showToast('无法访问摄像头：' + e.message, true);
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
    }

    function shoot() {
      if (!video.videoWidth) return;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      canvas.toBlob((blob) => {
        if (!blob) { showToast('拍照失败', true); return; }
        capturedBlob = blob;
        const filename = buildFilename();
        capturedFile = new File([blob], filename, { type: 'image/jpeg' });
        preview.src = URL.createObjectURL(blob);
        preview.hidden = false;
        video.hidden = true;
        btnShoot.disabled = true;
        btnRetake.hidden = false;
        btnSave.disabled = false;
        metaEl.textContent = `已拍：${(blob.size / 1024).toFixed(0)} KB · ${canvas.width}×${canvas.height}\n文件名：${filename}`;
      }, 'image/jpeg', 0.9);
    }

    function retake() {
      capturedBlob = null;
      capturedFile = null;
      preview.hidden = true;
      preview.removeAttribute('src');
      video.hidden = false;
      btnShoot.disabled = false;
      btnRetake.hidden = true;
      btnSave.disabled = true;
      metaEl.textContent = '';
    }

    async function saveToICloud() {
      if (!capturedFile) return;
      // iOS Safari 15.4+ 支持 navigator.canShare + files
      if (!navigator.canShare || !navigator.canShare({ files: [capturedFile] })) {
        showToast('当前浏览器不支持保存文件，请用 iOS Safari 15.4+', true);
        return;
      }
      try {
        await navigator.share({
          files: [capturedFile],
          title: 'EatSnap',
          text: `${getMeal()}餐 ${new Date().toISOString().slice(0,10)}`,
        });
        showToast('已保存。记得选 iCloud Drive → EatSnap 目录');
        retake();
      } catch (e) {
        if (e.name === 'AbortError') return; // 用户取消
        showToast('保存失败：' + e.message, true);
      }
    }

    btnCamera.addEventListener('click', startCamera);
    btnShoot.addEventListener('click', shoot);
    btnRetake.addEventListener('click', retake);
    btnSave.addEventListener('click', saveToICloud);
    window.addEventListener('beforeunload', stopCamera);
  </script>
</body>
</html>
